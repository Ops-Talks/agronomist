name: Agronomist Updates
on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Agronomist
        uses: ./. 
        with:
          mode: "update"
          output: "report.json"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update module refs"
          title: "chore: update module refs"
          body: "Updates generated by Agronomist."
          branch: "agronomist/updates"
          add-paths: |
            **/*.hcl
            **/*.tf
            report.json
