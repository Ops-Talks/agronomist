name: Agronomist Updates
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Agronomist
        run: |
          AGRONOMIST_VERSION="v0.4.6"
          WHEEL="agronomist-${AGRONOMIST_VERSION#v}-py3-none-any.whl"
          curl -L -o "$WHEEL" "https://github.com/Ops-Talks/agronomist/releases/download/${AGRONOMIST_VERSION}/${WHEEL}"
          pip install "$WHEEL"

      - name: Run Agronomist
        run: agronomist update --root . --output report.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update module refs"
          title: "chore: update module refs"
          body: "Updates generated by Agronomist."
          branch: "agronomist/updates"
          add-paths: |
            **/*.hcl
            **/*.tf
            report.json
