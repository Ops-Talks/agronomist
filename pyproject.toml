[tool.poetry]
name = "agronomist"
version = "0.1.0"
description = "CLI para detectar e atualizar refs de modulos Terragrunt"
readme = "README.md"
packages = [{ include = "agronomist", from = "src" }]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
requests = ">=2.32.0"
pyyaml = ">=6.0.1"

[tool.poetry.group.dev.dependencies]
black = ">=24.0.0"
ruff = ">=0.6.0"
pytest = ">=8.0.0"
pre-commit = ">=3.7.0"

[tool.poetry.scripts]
agronomist = "agronomist.cli:main"

[tool.black]
line-length = 100
target-version = ["py310"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[build-system]
requires = ["poetry-core>=1.9.0"]
build-backend = "poetry.core.masonry.api"
