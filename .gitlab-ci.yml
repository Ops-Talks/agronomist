stages:
  - report
  - update

variables:
  AGRONOMIST_ROOT: "."
  AGRONOMIST_RESOLVER: "git"
  AGRONOMIST_CONFIG: ".agronomist.yaml"

report:
  stage: report
  image: python:3.12
  script:
    - apt-get update && apt-get install -y git
    - pip install .
    - |
      TOKEN_ARG=""
      if [ -n "$GITHUB_TOKEN" ]; then
        TOKEN_ARG="--token $GITHUB_TOKEN"
      fi
      agronomist report --root "$AGRONOMIST_ROOT" \
        --config "$AGRONOMIST_CONFIG" \
        --resolver "$AGRONOMIST_RESOLVER" \
        --output report.json \
        --markdown report.md \
        $TOKEN_ARG
  artifacts:
    paths:
      - report.json
      - report.md

update:
  stage: update
  image: python:3.12
  when: manual
  script:
    - apt-get update && apt-get install -y git
    - pip install .
    - |
      TOKEN_ARG=""
      if [ -n "$GITHUB_TOKEN" ]; then
        TOKEN_ARG="--token $GITHUB_TOKEN"
      fi
      agronomist update --root "$AGRONOMIST_ROOT" \
        --config "$AGRONOMIST_CONFIG" \
        --resolver "$AGRONOMIST_RESOLVER" \
        --output report.json \
        $TOKEN_ARG
  artifacts:
    paths:
      - report.json
