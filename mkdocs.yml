site_name: Agronomist
site_description: Documentation for Agronomist
site_url: https://ops-talks.github.io/agronomist/
repo_url: https://github.com/Ops-Talks/agronomist
repo_name: Ops-Talks/agronomist
copyright: Copyright &copy; 2024-2026 Agronomist Project

theme:
  name: material
  language: en
  logo: assets/agronomist-logo.svg
  favicon: assets/agronomist-logo.svg
  palette:
    - scheme: default
      primary: deep orange
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - User Guide:
    - Getting Started: getting-started.md
    - CLI Reference: cli.md
    - Configuration: configuration.md
    - Resolvers: resolvers.md
    - Reports: reports.md
    - GitHub Action: github-action.md
    - GitLab CI: gitlab-ci.md
    - Troubleshooting: troubleshooting.md
  - Contributing:
    - Architecture: architecture.md
    - Development: development.md
    - Testing: testing.md
    - API Reference: api.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - toc:
      permalink: true
  - codehilite

extra_css:
  - stylesheets/extra.css

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Ops-Talks/agronomist
      name: GitHub Ops-Talks/agronomist
    - icon: fontawesome/solid/box-archive
      link: https://github.com/orgs/Ops-Talks/repositories
      name: Ops-Talks Projects
