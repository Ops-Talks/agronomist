name: "Agronomist"
description: "Detects and updates refs of Terragrunt modules"
inputs:
  github_token:
    description: "GitHub token for API calls"
    required: false
  root:
    description: "Root directory to scan"
    required: false
    default: "."
  include:
    description: "Comma-separated list of globs"
    required: false
    default: ""
  exclude:
    description: "Comma-separated list of globs"
    required: false
    default: ""
  mode:
    description: "report or update"
    required: false
    default: "report"
  output:
    description: "Report file"
    required: false
    default: "report.json"
  github_base_url:
    description: "GitHub API base URL"
    required: false
    default: "https://api.github.com"
  resolver:
    description: "Version resolver: git, github or auto"
    required: false
    default: "git"
  config:
    description: "Configuration file (yaml/json) for categories"
    required: false
    default: ".agronomist.yaml"
runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install Agronomist
      shell: bash
      run: pip install .
    - name: Run Agronomist
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        INCLUDE_ARGS=()
        if [ -n "${{ inputs.include }}" ]; then
          IFS=',' read -r -a INCLUDE_SPLIT <<< "${{ inputs.include }}"
          for pattern in "${INCLUDE_SPLIT[@]}"; do
            INCLUDE_ARGS+=("--include" "$pattern")
          done
        fi

        EXCLUDE_ARGS=()
        if [ -n "${{ inputs.exclude }}" ]; then
          IFS=',' read -r -a EXCLUDE_SPLIT <<< "${{ inputs.exclude }}"
          for pattern in "${EXCLUDE_SPLIT[@]}"; do
            EXCLUDE_ARGS+=("--exclude" "$pattern")
          done
        fi

        agronomist --root "${{ inputs.root }}" \
          --github-base-url "${{ inputs.github_base_url }}" \
          --resolver "${{ inputs.resolver }}" \
          --config "${{ inputs.config }}" \
          "${INCLUDE_ARGS[@]}" "${EXCLUDE_ARGS[@]}" \
          "${{ inputs.mode }}" --output "${{ inputs.output }}"
